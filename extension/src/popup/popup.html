<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>超级 AI 搜索</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <h1>超级 AI 搜索</h1>
        <a href="#" id="openOptions" class="link">渠道设置</a>
      </header>
      <label class="label" for="prompt">输入问题（将并行打开已启用渠道并填充输入框）</label>
      <textarea
        id="prompt"
        class="prompt"
        rows="6"
        placeholder="例如：对比 React 与 Vue 在大型项目中的优劣…"
      ></textarea>
      <div class="actions">
        <button type="button" id="submit" class="btn primary">发送到各渠道</button>
      </div>
      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
